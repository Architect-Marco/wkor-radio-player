<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WKOR FM | Noir Sector Sovereign Audio v1.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        noir: '#08080d',
                        deepNoir: '#000000',
                        neonPink: '#ff2eb6',
                        whiteBezel: '#ffffff'
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .bezel { border: 1.8px solid #ffffff; }
            .viz-bar {
                box-shadow: 0 0 6px #ff2eb6, 0 0 10px rgba(255,46,182,0.35);
                transition: height 0.08s ease;
            }
            .haptic { transition: transform 0.15s ease-out; }
            .haptic:active { transform: scale(0.92); }
        }
    </style>
</head>
<body class="bg-noir text-white min-h-screen flex flex-col items-center justify-center p-4">
    <div class="w-full max-w-sm aspect-[9/16] bezel rounded-xl bg-deepNoir relative overflow-hidden shadow-2xl flex flex-col">
        <!-- Bigger Album Cover -->
        <div class="h-[220px] w-full bg-gray-900 relative">
            <img id="coverArt" alt="Album Cover" class="w-full h-full object-cover">
            <audio id="mainAudio" preload="auto" playsinline crossorigin="anonymous">
                Your browser does not support audio playback.
            
        </div>

        <!-- 24‑bar visualizer + title, moved down -->
        <div class="mt-auto mb-6 flex flex-col items-center gap-3">
            <div id="visualizer" class="flex gap-0.5 items-end h-14 justify-center"></div>
            <h2 id="trackTitle" class="text-base font-semibold tracking-wide text-center px-4 leading-tight">WKOR FM • NOIR SECTOR</h2>
            <p class="text-xs text-gray-300">Sovereign Audio Interface v1.0</p>
        </div>

        <!-- Playback controls -->
        <div class="mb-10 flex justify-center items-center gap-8">
            <button id="prevBtn" class="text-white text-3xl hover:text-neonPink transition-colors">◀</button>
            <div class="w-28 h-28 rounded-full border-2 border-neonPink flex items-center justify-center haptic shadow-[0_0_15px_rgba(255,46,182,0.5)]">
                <button id="playBtn" class="w-20 h-20 rounded-full bg-neonPink text-black font-bold text-lg tracking-wider">PLAY</button>
            </div>
            <button id="nextBtn" class="text-white text-3xl hover:text-neonPink transition-colors">▶</button>
        </div>
    </div>

    <script src="assets/js/player.js"></script>
</body>
</html>
